<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0A1F44">
<title>ENTRIX · Installation Expenses</title>
<style>
:root{
  --navy:#0A1F44; --navy-2:#14305F; --amber:#F2A900; --amber-dim:#C88C05;
  --paper:#F4F6F9; --card:#FFFFFF; --ink:#16202E; --muted:#6B7789; --line:#DDE3EC;
  --green:#1B7F5A; --red:#C0392B;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;background:var(--paper);color:var(--ink);
  font-size:15px;line-height:1.45;padding-bottom:calc(72px + env(safe-area-inset-bottom))}
.num{font-variant-numeric:tabular-nums;letter-spacing:-.01em}
button,input,select,textarea{font-family:inherit;font-size:16px}
button{cursor:pointer;border:none;background:none;color:inherit}

header{background:var(--navy);color:#fff;padding:calc(12px + env(safe-area-inset-top)) 16px 12px;
  display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:20}
.brand{font-weight:800;letter-spacing:.16em;font-size:13px}
.brand span{color:var(--amber)}
header .sub{font-size:11px;color:#9FB0CC;letter-spacing:.04em;margin-top:1px}
.whoami{margin-left:auto;text-align:right;font-size:11px;color:#9FB0CC}
.whoami b{display:block;color:#fff;font-size:12px;letter-spacing:.02em}
.sync{display:inline-block;width:7px;height:7px;border-radius:50%;background:#4B5C78;margin-right:5px;vertical-align:middle}
.sync.on{background:#3ED598}
.sync.off{background:var(--amber)}

main{padding:14px 14px 24px;max-width:760px;margin:0 auto}
.view{display:none}
.view.active{display:block}

nav{position:fixed;left:0;right:0;bottom:0;z-index:20;background:#fff;border-top:1px solid var(--line);
  display:grid;grid-template-columns:repeat(4,1fr);padding-bottom:env(safe-area-inset-bottom)}
nav button{padding:9px 4px 10px;color:var(--muted);font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;font-weight:700}
nav button .ic{display:block;font-size:19px;line-height:1.25;font-weight:400}
nav button.on{color:var(--navy)}
nav button.on .ic{color:var(--amber)}

.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:12px}
.eyebrow{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:800;margin:18px 2px 8px}
.eyebrow:first-child{margin-top:0}
label{display:block;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:700;margin:0 0 5px}
input,select,textarea{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--ink);outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--navy);box-shadow:0 0 0 3px rgba(10,31,68,.09)}
.field{margin-bottom:12px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{display:block;width:100%;padding:14px;border-radius:10px;background:var(--amber);color:#241900;
  font-weight:800;letter-spacing:.05em;text-transform:uppercase;font-size:13px}
.btn:active{background:var(--amber-dim)}
.btn.dark{background:var(--navy);color:#fff}
.btn.ghost{background:#fff;border:1px solid var(--line);color:var(--navy)}
.btn.danger{background:#fff;border:1px solid #EBC3BE;color:var(--red)}
.btn:disabled{opacity:.5}
.btn.sm{padding:9px;font-size:11px}

.seg.seg3{grid-template-columns:1fr 1fr 1fr}
.seg.seg3 button{padding:11px 4px;font-size:10.5px;letter-spacing:.04em}
.seg{display:grid;grid-template-columns:1fr 1fr;border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-bottom:14px}
.seg button{padding:11px;font-weight:800;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);background:#fff}
.seg button.on{background:var(--navy);color:#fff}

.heads{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.head-opt{border:1px solid var(--line);border-radius:10px;padding:11px 10px;text-align:left;background:#fff;font-weight:700;font-size:13px;line-height:1.25}
.head-opt small{display:block;font-weight:500;font-size:10.5px;color:var(--muted);letter-spacing:.03em;margin-top:2px}
.head-opt.on{border-color:var(--navy);background:#F0F4FB;box-shadow:inset 3px 0 0 var(--hc,var(--navy))}

.amount-wrap{position:relative}
.amount-wrap .cur{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-weight:800;color:var(--muted)}
#amount{padding-left:32px;font-size:26px;font-weight:800;letter-spacing:-.02em}

.site{background:#fff;border:1px solid var(--line);border-radius:12px;padding:13px 14px;margin-bottom:10px;width:100%;text-align:left;display:block}
.site h3{margin:0;font-size:15px;font-weight:800;letter-spacing:-.01em}
.site .meta{font-size:11.5px;color:var(--muted);margin-top:2px}
.bar{display:flex;height:9px;border-radius:5px;overflow:hidden;background:#EDF0F5;margin:11px 0 8px}
.bar i{display:block;height:100%}
.figs{display:flex;justify-content:space-between;align-items:flex-end;gap:8px;margin-top:2px}
.figs .big{font-size:20px;font-weight:800}
.pl{text-align:right;font-weight:800;font-size:16px}
.pl small{display:block;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;font-weight:700;color:var(--muted)}
.pos{color:var(--green)} .neg{color:var(--red)}

.ent{display:flex;gap:11px;padding:11px 2px;border-bottom:1px solid var(--line);align-items:flex-start}
.ent:last-child{border-bottom:none}
.dot{width:9px;height:9px;border-radius:3px;margin-top:6px;flex:none}
.ent .body{flex:1;min-width:0}
.ent .t1{font-weight:700;font-size:14px}
.ent .t2{font-size:11.5px;color:var(--muted);margin-top:1px;word-break:break-word}
.ent .amt{font-weight:800;white-space:nowrap}
.ent .amt.adv{color:var(--green)}
.ent .del{color:var(--red);font-size:11px;font-weight:700;margin-top:4px}

.tot{display:flex;justify-content:space-between;gap:10px;padding:9px 2px;border-bottom:1px solid var(--line);font-size:14px}
.tot:last-child{border-bottom:none}
.tot b{font-weight:800;white-space:nowrap}

.grand{background:var(--navy);color:#fff;border-radius:12px;padding:16px;margin-bottom:12px}
.grand .k{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#9FB0CC;font-weight:700}
.grand .v{font-size:30px;font-weight:800;letter-spacing:-.02em;margin-top:2px}
.grand .split{display:flex;flex-wrap:wrap;gap:18px;margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,.15);font-size:12px;color:#C9D6EA}
.grand .split b{display:block;color:#fff;font-size:15px;font-weight:800}
.grand.profit{background:linear-gradient(135deg,#0A1F44,#14305F)}
.grand .v.win{color:#3ED598} .grand .v.lose{color:#FF8A7A}

.pbar{display:flex;height:26px;border-radius:7px;overflow:hidden;margin:12px 0 6px;background:rgba(255,255,255,.12)}
.pbar i{display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;letter-spacing:.06em;color:#0A1F44;white-space:nowrap;overflow:hidden}

.empty{text-align:center;color:var(--muted);padding:34px 16px;font-size:13.5px}
.empty b{display:block;color:var(--ink);font-size:15px;margin-bottom:5px}

#gate{position:fixed;inset:0;background:var(--navy);z-index:50;display:flex;align-items:center;justify-content:center;padding:24px;overflow:auto}
#gate .box{width:100%;max-width:340px;text-align:center}
#gate .logo{font-weight:800;letter-spacing:.2em;color:#fff;font-size:17px;margin-bottom:4px}
#gate .logo span{color:var(--amber)}
#gate .tag{color:#9FB0CC;font-size:12px;letter-spacing:.06em;margin-bottom:26px}
#gate input{text-align:center;font-size:28px;letter-spacing:.5em;font-weight:800;padding:14px 12px}
#gate .err{color:var(--amber);font-size:12.5px;height:18px;margin:9px 0}
#gate .hint{color:#7C8CA8;font-size:11px;margin-top:18px;line-height:1.6}

.toast{position:fixed;left:14px;right:14px;bottom:calc(80px + env(safe-area-inset-bottom));background:var(--navy);color:#fff;
  padding:13px 15px;border-radius:10px;font-size:13.5px;font-weight:600;z-index:40;opacity:0;transform:translateY(8px);transition:.22s;pointer-events:none}
.toast.show{opacity:1;transform:none}
.toast.bad{background:var(--red)}
.banner{background:#FFF6E0;border:1px solid #F0DCA8;color:#6B5310;font-size:12.5px;padding:10px 12px;border-radius:10px;margin-bottom:12px}
.filters{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.inline{display:flex;gap:8px}
.calc{font-size:12px;color:var(--muted);background:#F0F4FB;border:1px solid #DCE5F3;border-radius:8px;padding:9px 11px;margin-bottom:12px}
.calc:empty{display:none}
.calc b{color:var(--navy);font-weight:800}
.staffrow{display:grid;grid-template-columns:1fr auto auto;gap:7px;align-items:center;margin-bottom:9px}
.staffrow input{padding:9px 10px}
.btn.mini{width:auto;padding:9px 11px;font-size:10.5px;letter-spacing:.03em}
.btn.armed,.del.armed{background:var(--red);border-color:var(--red);color:#fff}
.del.armed{padding:2px 7px;border-radius:5px}
.inline .btn{width:auto;flex:1}
@media (max-width:360px){.heads{grid-template-columns:1fr}}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
:focus-visible{outline:2px solid var(--amber);outline-offset:2px}

#report{display:none}
@media print{
  @page{size:A4;margin:14mm}
  body{background:#fff;padding:0;font-size:11px}
  header,nav,main,.toast{display:none!important}
  #report{display:block;color:#000}
  #report .rh{border-bottom:2px solid #0A1F44;padding-bottom:8px;margin-bottom:14px}
  #report .rh .co{font-size:19px;font-weight:800;letter-spacing:.16em;color:#0A1F44}
  #report .rh .ti{font-size:13px;font-weight:700;margin-top:5px}
  #report .rh .pd{font-size:10px;color:#555;margin-top:2px}
  #report h4{font-size:11px;letter-spacing:.1em;text-transform:uppercase;margin:16px 0 6px;color:#0A1F44}
  #report table{width:100%;border-collapse:collapse;font-size:10.5px}
  #report th{text-align:left;background:#0A1F44;color:#fff;padding:5px 6px;font-size:9.5px;letter-spacing:.05em;text-transform:uppercase}
  #report td{padding:4px 6px;border-bottom:1px solid #ddd;vertical-align:top}
  #report td.r,#report th.r{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
  #report tr.sum td{font-weight:800;border-top:1.5px solid #0A1F44;border-bottom:none;background:#F2F5FA}
  #report .kpi{display:flex;gap:22px;margin:10px 0 4px;flex-wrap:wrap}
  #report .kpi div{font-size:10px;color:#555}
  #report .kpi b{display:block;font-size:15px;color:#000;font-variant-numeric:tabular-nums}
  #report .foot{margin-top:20px;padding-top:7px;border-top:1px solid #bbb;font-size:9px;color:#666;display:flex;justify-content:space-between}
  #report .neg{color:#B01A0F}
}
</style>
</head>
<body>

<div id="gate">
  <div class="box">
    <div class="logo">ENT<span>R</span>IX</div>
    <div class="tag">Installation Expenses</div>
    <input id="pin" type="tel" inputmode="numeric" maxlength="4" placeholder="••••" autocomplete="off">
    <div class="err" id="gateErr"></div>
    <button class="btn" id="gateBtn">Open</button>
    <div class="hint">Supervisor PIN 5555 · Owner PIN 9999<br>Change these at the top of the file.</div>
  </div>
</div>

<header>
  <div>
    <div class="brand">ENT<span>R</span>IX</div>
    <div class="sub">Installation Expenses</div>
  </div>
  <div class="whoami">
    <b id="whoName">—</b>
    <span><i class="sync" id="syncDot"></i><span id="syncTxt">connecting</span></span>
  </div>
</header>

<main>
  <!-- ENTRY -->
  <section class="view active" id="v-entry">
    <div id="cfgBanner"></div>
    <div class="seg seg3">
      <button data-kind="expense" class="on">Expense</button>
      <button data-kind="advance">Advance</button>
      <button data-kind="contractor">Contractor bill</button>
    </div>
    <div class="card">
      <div class="field"><label for="site">Site</label><select id="site"></select></div>
      <div class="field" id="headField"><label>Expense head</label><div class="heads" id="heads"></div></div>
      <div class="field" id="subField"><label for="sub">Item</label><select id="sub"></select></div>
      <div class="field" id="cpField" style="display:none"><label for="cpType">Payment against</label>
        <select id="cpType"><option>Poles installed — running bill</option><option>Mobilisation advance</option><option>Final bill</option><option>Retention release</option></select>
      </div>
      <div class="field" id="poleField" style="display:none"><label for="cpPoles">Number of poles in this bill</label>
        <input id="cpPoles" type="tel" inputmode="numeric" placeholder="0">
        <div class="calc" id="poleCalc" style="margin-top:9px"></div>
      </div>
      <div class="field">
        <label for="amount">Amount</label>
        <div class="amount-wrap"><span class="cur">₹</span><input id="amount" type="tel" inputmode="decimal" placeholder="0"></div>
      </div>
      <div class="row">
        <div class="field"><label for="date">Date</label><input id="date" type="date"></div>
        <div class="field"><label for="mode">Paid by</label>
          <select id="mode"><option>Cash</option><option>UPI</option><option>Bank transfer</option><option>Credit / on account</option></select>
        </div>
      </div>
      <div class="field"><label for="payee" id="payeeLbl">Paid to</label><input id="payee" placeholder="Name of labour / vendor / driver"></div>
      <div class="field"><label for="note">Remark <span style="text-transform:none;letter-spacing:0">(bill no., vehicle no., pole count)</span></label>
        <textarea id="note" rows="2" placeholder="Optional"></textarea></div>
      <button class="btn" id="saveBtn">Save entry</button>
    </div>
    <div class="eyebrow">Your last entries</div>
    <div class="card" id="mine"></div>
  </section>

  <!-- SITES -->
  <section class="view" id="v-sites">
    <div id="siteForm"></div>
    <div id="siteList"></div>
  </section>

  <!-- LEDGER -->
  <section class="view" id="v-ledger">
    <button class="btn ghost sm" id="backBtn" style="width:auto;padding:8px 14px;margin-bottom:12px">← All sites</button>
    <div id="ledgerHead"></div>
    <div class="eyebrow">Entries</div>
    <div class="card" id="ledgerBody"></div>
  </section>

  <!-- SUMMARY -->
  <section class="view" id="v-summary">
    <div class="filters">
      <div><label for="fFrom">From</label><input id="fFrom" type="date"></div>
      <div><label for="fTo">To</label><input id="fTo" type="date"></div>
    </div>
    <div class="field"><label for="fSite">Site</label><select id="fSite"></select></div>
    <div id="sumBody"></div>
    <div class="inline">
      <button class="btn dark" id="pdfBtn">PDF report</button>
      <button class="btn ghost" id="csvBtn">CSV</button>
    </div>
    <div id="staffBox"></div>
  </section>
</main>

<nav>
  <button data-go="entry" class="on"><span class="ic">＋</span>Entry</button>
  <button data-go="sites"><span class="ic">▦</span>Sites</button>
  <button data-go="summary"><span class="ic">∑</span>Summary</button>
  <button data-go="lock"><span class="ic">⎋</span>Lock</button>
</nav>

<div id="report"></div>
<div class="toast" id="toast"></div>

<script type="module">
/* ════════════════════════════════════════════
   1. SETTINGS — edit these
   ════════════════════════════════════════════ */
const SUPERVISOR_PIN = '5555';
const OWNER_PIN      = '9999';

// Supervisors are added by the owner inside the app (Summary tab).
// No built-in names — the list starts empty.

// Firebase project: project-site-expenses. Blank the apiKey to fall back to demo mode.
const firebaseConfig = {
  apiKey: "AIzaSyCIoj0grG9a-wwvBQKL6rffl3d4SQHVm5o",
  authDomain: "project-site-expenses.firebaseapp.com",
  projectId: "project-site-expenses",
  storageBucket: "project-site-expenses.firebasestorage.app",
  messagingSenderId: "603747323761",
  appId: "1:603747323761:web:4b1c97f158c2dcd33ab0d0"
};

/* ════════════════════════════════════════════
   2. EXPENSE HEADS
   ════════════════════════════════════════════ */
const HEADS = {
  labour:   {label:'Labour & wages',     color:'#2E5FA3', items:['Skilled labour','Unskilled labour','Contractor payment','Overtime','Supervisor allowance']},
  transport:{label:'Transport & freight',color:'#0E8577', items:['Truck / trailer freight','Tempo / local cartage','Diesel & fuel','Toll & permit','Loading / unloading']},
  crane:    {label:'Crane & machinery',  color:'#B4622A', items:['Crane hire','JCB / excavator','DG set','Compressor / drilling','Tool & tackle hire']},
  material: {label:'Material & misc',    color:'#7A4FA3', items:['Cement / sand / metal','Foundation bolts & template','Hardware & consumables','Earthing material','Food & refreshment','Lodging','Site misc']}
};
const ADV_COLOR = '#F2A900';
const CON_COLOR = '#C0392B';   // payments to a petty contractor

/* ════════════════════════════════════════════
   3. Firebase (offline cache on)
   ════════════════════════════════════════════ */
let db=null, LIVE=false;
let SITES=[], ENTRIES=[], STAFF=[];

async function initDB(){
  if(!firebaseConfig.apiKey){ demoSeed(); setSync('demo'); return; }
  try{
    const [{initializeApp},fs,auth] = await Promise.all([
      import('https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js'),
      import('https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js'),
      import('https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js')
    ]);
    const app = initializeApp(firebaseConfig);
    db = fs.initializeFirestore(app,{localCache:fs.persistentLocalCache({tabManager:fs.persistentMultipleTabManager()})});
    window.FS = fs; LIVE = true;

    // Silent anonymous sign-in — lets the security rules block outsiders.
    try{ await auth.signInAnonymously(auth.getAuth(app)); }
    catch(e){
      $('cfgBanner').innerHTML = '<div class="banner"><b>Sign-in blocked.</b> In Firebase console open Authentication → Sign-in method and enable <b>Anonymous</b>, then reload. ('+e.code+')</div>';
    }

    fs.onSnapshot(fs.query(fs.collection(db,'sites'), fs.orderBy('name')), s=>{
      SITES = s.docs.map(d=>({id:d.id,...d.data()})); renderSiteSelects(); renderAll();
    }, e=>dbErr(e));

    fs.onSnapshot(fs.query(fs.collection(db,'staff'), fs.orderBy('name')), s=>{
      STAFF = s.docs.map(d=>({id:d.id,...d.data()})); renderStaffBox(); renderSiteForm();
    }, e=>dbErr(e));

    fs.onSnapshot(fs.query(fs.collection(db,'expenses'), fs.orderBy('date','desc'), fs.limit(3000)), s=>{
      ENTRIES = s.docs.map(d=>({id:d.id,...d.data()}));
      setSync(s.metadata.fromCache?'cache':'live'); renderAll();
    }, e=>dbErr(e));
  }catch(err){
    console.error(err);
    $('cfgBanner').innerHTML = '<div class="banner"><b>Could not reach Firebase.</b> '+err.message+'</div>';
    setSync('error', err.message);
  }
}
function dbErr(e){
  setSync('error', e.message);
  if(e.code==='permission-denied')
    $('cfgBanner').innerHTML = '<div class="banner"><b>Blocked by security rules.</b> Publish the rules from the setup steps in Firestore → Rules.</div>';
}
function setSync(state,msg){
  const dot=$('syncDot'), txt=$('syncTxt');
  dot.className='sync'+(state==='live'?' on':(state==='cache'||state==='demo')?' off':'');
  txt.textContent = state==='live'?'synced':state==='cache'?'offline — will sync':state==='demo'?'demo mode':'not connected';
  if(msg) console.warn(msg);
}
function demoSeed(){
  STAFF = []; SITES = []; ENTRIES = [];
  $('cfgBanner').innerHTML = '<div class="banner"><b>Demo mode.</b> Paste your Firebase config in section 1 of the file to save entries and sync between supervisors.</div>';
  renderSiteSelects(); renderStaffBox(); renderAll();
}

/* ════════════════════════════════════════════
   4. State + helpers
   ════════════════════════════════════════════ */
let ME = {name:'', role:'supervisor'};
let kind='expense', head='labour', openSite=null, editSite=null;

const $ = id => document.getElementById(id);
const money = n => '₹' + Math.round(Number(n)||0).toLocaleString('en-IN');
const today = () => new Date().toISOString().slice(0,10);
const dmy = s => { const [y,m,d]=String(s).split('-'); return `${d}/${m}/${y.slice(2)}`; };
const site = id => SITES.find(s=>s.id===id) || {};
const siteName = id => site(id).name || 'Unknown site';
const isOwner = () => ME.role==='owner';
function toast(msg,bad){ const t=$('toast'); t.textContent=msg; t.className='toast show'+(bad?' bad':''); setTimeout(()=>t.className='toast'+(bad?' bad':''),2600); }

/* ════════════════════════════════════════════
   5. Gate
   ════════════════════════════════════════════ */
$('gateBtn').onclick = enter;
$('pin').addEventListener('keydown', e=>{ if(e.key==='Enter') enter(); });
function enter(){
  const v=$('pin').value.trim();
  if(v===OWNER_PIN){ ME={name:'Owner',role:'owner'}; unlock(); }
  else if(v===SUPERVISOR_PIN){ pickName(); }
  else { $('gateErr').textContent='Wrong PIN. Try again.'; $('pin').value=''; }
}
function pickName(){
  const box=document.querySelector('#gate .box');
  box.innerHTML = '<div class="logo">ENT<span>R</span>IX</div><div class="tag">Who is entering?</div>'
    + STAFF.map(s=>`<button class="btn ghost" style="margin-bottom:9px" data-n="${s.name}">${s.name}</button>`).join('')

function totals(id){
  const s = site(id);
  const t={labour:0,transport:0,crane:0,material:0,advance:0,contractor:0,spend:0,count:0,polesBilled:0};
  ENTRIES.filter(e=>e.siteId===id).forEach(e=>{
    t[e.head]=(t[e.head]||0)+e.amount; t.count++;
    if(e.head==='contractor') t.polesBilled += Number(e.poles)||0;
    if(e.head!=='advance') t.spend+=e.amount;   // contractor bills are a cost too
  });

  t.petty   = s.execMode==='petty';
  t.perPole = s.basis==='pole';
  t.rate    = Number(s.ratePerPole)||0;
  t.cRate   = Number(s.contractorRate)||0;
  t.qty     = Number(s.polesTotal)||0;
  t.cost    = Number(s.projectCost)||0;          // full order value (rate × total poles)
  t.direct  = t.spend - t.contractor;            // transport etc. ENTRIX pays itself
  t.paidCon = t.contractor;

  // poles actually installed: from contractor bills, or entered by hand for own labour
  t.done = t.perPole ? (t.petty ? t.polesBilled : (Number(s.polesDone)||0)) : 0;

  if(t.perPole){
    t.earned  = t.done * t.rate;                 // revenue booked on work done
    t.awarded = t.petty ? t.cRate * t.qty : 0;   // full sub-contract value
    t.conCost = t.petty ? t.done * t.cRate : 0;  // contractor's dues on work done
    t.dueCon  = Math.max(0, t.conCost - t.paidCon);
    t.profit  = t.earned - t.conCost - t.direct;
    t.perPoleMargin = t.done ? Math.round((t.profit/t.done)*100)/100 : (t.rate - t.cRate);
    t.margin  = t.earned ? Math.round(t.profit/t.earned*1000)/10 : 0;
    t.pending = Math.max(0, t.qty - t.done);
  }else{
    t.earned  = t.cost;
    t.awarded = Number(s.contractAmount)||0;
    t.conCost = t.awarded;
    t.dueCon  = Math.max(0, t.awarded - t.paidCon);
    t.profit  = t.petty && t.awarded ? t.cost - t.awarded - t.direct : t.cost - t.spend;
    t.margin  = t.cost ? Math.round(t.profit/t.cost*1000)/10 : 0;
  }
  return t;
}

  $('siteList').innerHTML = SITES.map(s=>{
    const t=totals(s.id);
    const bar = Object.keys(HEADS).map(k=> t.spend? `<i style="width:${t[k]/t.spend*100}%;background:${HEADS[k].color}"></i>`:'').join('');
    const right = isOwner()
      ? `<div class="pl ${t.profit>=0?'pos':'neg'}"><small>${t.profit>=0?'profit':'loss'}</small>${money(Math.abs(t.profit))}${t.cost?` <span style="font-size:11px">(${t.margin}%)</span>`:''}</div>`

function bindDeletes(scope){
  scope.querySelectorAll('[data-del]').forEach(b=> b.onclick = async ()=>{
    if(b.dataset.armed!=='1'){
      b.dataset.armed='1'; b.textContent='Tap to confirm'; b.classList.add('armed');
      setTimeout(()=>{ if(b.isConnected){ b.dataset.armed='0'; b.textContent='Delete'; b.classList.remove('armed'); } },4000);
      return;
    }
    try{
      if(LIVE) await window.FS.deleteDoc(window.FS.doc(db,'expenses',b.dataset.del));
      else { ENTRIES = ENTRIES.filter(x=>x.id!==b.dataset.del); renderAll(); }
      toast('Entry deleted');
    }catch(e){ toast('Could not delete: '+e.message, true); }
  });
}
function renderMine(){
  const rows = ENTRIES.filter(e=>e.by===ME.name).slice(0,8);
  $('mine').innerHTML = rows.length ? rows.map(entRow).join('')
    : '<div class="empty">Nothing entered yet. Your saved entries will appear here.</div>';
  bindDeletes($('mine'));
}

/* ════════════════════════════════════════════
   9. Summary, staff list, CSV
   ════════════════════════════════════════════ */
['fFrom','fTo','fSite'].forEach(id=> $(id).addEventListener('change', renderSummary));
function filtered(){
  const from=$('fFrom').value, to=$('fTo').value, s=$('fSite').value;
  return ENTRIES.filter(e => (!s||e.siteId===s) && (!from||e.date>=from) && (!to||e.date<=to));
}
function renderSummary(){
  const rows=filtered();
  const t={labour:0,transport:0,crane:0,material:0,advance:0,contractor:0};
  rows.forEach(e=> t[e.head]=(t[e.head]||0)+e.amount);
  const spend=t.labour+t.transport+t.crane+t.material+t.contractor;
  const pick=$('fSite').value;
  const scope = pick ? SITES.filter(s=>s.id===pick) : SITES;
  const cost = scope.reduce((a,s)=>a+(Number(s.projectCost)||0),0);
  const earned = scope.reduce((a,s)=>a+totals(s.id).earned,0);
  const awarded = scope.reduce((a,s)=>a+totals(s.id).conCost,0);
  const profit = scope.reduce((a,s)=>a+totals(s.id).profit,0);
  const poles = scope.reduce((a,s)=>a+totals(s.id).done,0);
  const margin = earned? Math.round(profit/earned*1000)/10 : 0;

  const top = isOwner() ? `
    <div class="grand profit">
      <div class="k">Net profit${pick?' — '+siteName(pick):' — all sites'}</div>
      <div class="v num ${profit>=0?'win':'lose'}">${money(profit)}</div>
      <div class="k" style="color:#9FB0CC">${earned?margin+'% of value earned':'add order values to your sites'}${poles?' · '+poles+' poles installed':''}</div>
      <div class="split">
        <div>Order value<b class="num">${money(cost)}</b></div>
        <div>Earned<b class="num">${money(earned)}</b></div>
        ${awarded?`<div>Contractor cost<b class="num">${money(awarded)}</b></div>`:''}
        <div>Total spend<b class="num">${money(spend)}</b></div>
        <div>Entries<b class="num">${rows.length}</b></div>
      </div>
    </div>` : `
    <div class="grand">
      <div class="k">Total spend</div>
      <div class="v num">${money(spend)}</div>
      <div class="split"><div>Advances<b class="num">${money(t.advance)}</b></div><div>Entries<b class="num">${rows.length}</b></div></div>
    </div>`;

  $('sumBody').innerHTML = top + `
    <div class="card">
      ${Object.entries(HEADS).map(([k,h])=>{
        const pct = spend? Math.round(t[k]/spend*100):0;
        return `<div class="tot"><span><i class="dot" style="display:inline-block;background:${h.color}"></i> ${h.label} <span style="color:var(--muted);font-size:12px">${pct}%</span></span><b class="num">${money(t[k])}</b></div>`;
      }).join('')}
      ${t.contractor?`<div class="tot"><span><i class="dot" style="display:inline-block;background:${CON_COLOR}"></i> Contractor bills <span style="color:var(--muted);font-size:12px">${spend?Math.round(t.contractor/spend*100):0}%</span></span><b class="num">${money(t.contractor)}</b></div>`:''}
    </div>
    <div class="eyebrow">Site by site</div>
    <div class="card">
      ${SITES.map(s=>{
        const v = rows.filter(e=>e.siteId===s.id && e.head!=='advance').reduce((a,b)=>a+b.amount,0);
        if(!v && !(isOwner()&&s.projectCost)) return '';
        const p = (Number(s.projectCost)||0)-v;
        return `<div class="tot"><span>${s.name}<br><span style="font-size:11px;color:var(--muted)">${s.supervisor||'—'}</span></span>
          <b class="num">${money(v)}${isOwner()&&s.projectCost?`<br><span class="${p>=0?'pos':'neg'}" style="font-size:12px">${p>=0?'+':'−'}${money(Math.abs(p))}</span>`:''}</b></div>`;
      }).join('') || '<div class="empty">Nothing in this period.</div>'}
    </div>`;
}

function renderStaffBox(){
  if(!isOwner()){ $('staffBox').innerHTML=''; return; }
  const list = STAFF;
  $('staffBox').innerHTML = `
    <div class="eyebrow">Supervisors</div>
    <div class="card">
      ${list.length?'':'<div class="empty" style="padding:12px 4px">No supervisors added yet.</div>'}
      ${list.map(s=>`
        <div class="staffrow">
          <input class="sname" data-id="${s.id}" value="${s.name}" autocomplete="off">
          <button class="btn ghost sm mini" data-save="${s.id}">Save</button>
          <button class="btn danger sm mini" data-rm="${s.id}">Remove</button>
        </div>`).join('')}
      <div class="field" style="margin:14px 0 0"><label for="newStaff">Add a supervisor</label><input id="newStaff" placeholder="Name" autocomplete="off"></div>
      <button class="btn ghost sm" id="addStaff">Add supervisor</button>
    </div>`;

  $('addStaff').onclick = async ()=>{
    const n=$('newStaff').value.trim(); if(!n) return toast('Type a name first', true);
    try{
      if(LIVE) await window.FS.addDoc(window.FS.collection(db,'staff'), {name:n});
      else { STAFF.push({id:'st'+Date.now(),name:n}); renderStaffBox(); renderSiteForm(); }
      $('newStaff').value=''; toast('Supervisor added');
    }catch(e){ toast('Could not add: '+e.message, true); }
  };

  // Save = rename. Sites already using the old name are updated too.
  $('staffBox').querySelectorAll('[data-save]').forEach(b=> b.onclick = async ()=>{
    const id=b.dataset.save;
    const input=$('staffBox').querySelector(`.sname[data-id="${id}"]`);
    const name=input.value.trim();
    const rec=STAFF.find(x=>x.id===id) || {id,name:input.defaultValue};
    if(!name) return toast('Name cannot be blank', true);
    if(name===rec.name) return toast('No change');
    const old=rec.name, hit=SITES.filter(s=>s.supervisor===old);
    try{
      if(LIVE){
        await window.FS.updateDoc(window.FS.doc(db,'staff',id), {name});
        for(const s of hit) await window.FS.updateDoc(window.FS.doc(db,'sites',s.id), {supervisor:name});
      }else{
        rec.name=name; if(!STAFF.includes(rec)) STAFF.push(rec);
        hit.forEach(s=> s.supervisor=name); renderAll();
      }
      toast('Saved'+(hit.length?` · ${hit.length} site(s) updated`:''));
    }catch(e){ toast('Could not save: '+e.message, true); }
  });

  // Remove = tap once to arm, tap again to confirm (no browser popup)
  $('staffBox').querySelectorAll('[data-rm]').forEach(b=> b.onclick = async ()=>{
    if(b.dataset.armed!=='1'){
      b.dataset.armed='1'; b.textContent='Tap to confirm'; b.classList.add('armed');
      setTimeout(()=>{ if(b.isConnected){ b.dataset.armed='0'; b.textContent='Remove'; b.classList.remove('armed'); } },4000);
      return;
    }
    const id=b.dataset.rm;
    try{
      if(LIVE) await window.FS.deleteDoc(window.FS.doc(db,'staff',id));
      else { STAFF=STAFF.filter(x=>x.id!==id); renderStaffBox(); renderSiteForm(); }
      toast('Supervisor removed');
    }catch(e){ toast('Could not remove: '+e.message, true); }
  });
}

$('pdfBtn').onclick = ()=>{
  const rows=filtered();
  const pick=$('fSite').value;
  const scope = pick ? SITES.filter(x=>x.id===pick) : SITES;
  if(!scope.length) return toast('No sites to report on', true);

  const from=$('fFrom').value, to=$('fTo').value;
  const period = (from||to) ? `${from?dmy(from):'start'} to ${to?dmy(to):dmy(today())}` : 'All entries to date';

  const t={labour:0,transport:0,crane:0,material:0,advance:0,contractor:0};
  rows.forEach(e=> t[e.head]=(t[e.head]||0)+e.amount);
  const spend=t.labour+t.transport+t.crane+t.material+t.contractor;
  const cost=scope.reduce((a,x)=>a+(Number(x.projectCost)||0),0);
  const earned=scope.reduce((a,x)=>a+totals(x.id).earned,0);
  const poles=scope.reduce((a,x)=>a+totals(x.id).done,0);
  const profit=scope.reduce((a,x)=>a+totals(x.id).profit,0);
  const owner=isOwner();

  const awardedTot = scope.reduce((a,x)=>a+totals(x.id).conCost,0);
  const siteRows = scope.map(x=>{
    const q=totals(x.id);
    const inPeriod = rows.filter(e=>e.siteId===x.id && e.head!=='advance').reduce((a,b)=>a+b.amount,0);
    return `<tr>
      <td>${x.name}${x.client?'<br><span style="color:#666">'+x.client+'</span>':''}</td>
      <td>${x.supervisor||'—'}</td>
      <td>${q.petty?(x.contractor||'—'):'Own labour'}${q.perPole?`<br><span style="color:#666">${money(q.rate)}${q.petty?' / '+money(q.cRate):''} per pole</span>`:''}</td>
      <td class="r">${q.perPole?q.done+(q.qty?' / '+q.qty:''):'—'}</td>
      ${owner?`<td class="r">${money(q.earned)}</td><td class="r">${q.petty?money(q.conCost):'—'}</td>`:''}
      <td class="r">${money(inPeriod)}</td>
      ${owner?`<td class="r">${q.petty?money(q.dueCon):'—'}</td><td class="r ${q.profit<0?'neg':''}">${money(q.profit)}</td>`:''}
    </tr>`;
  }).join('');

  const headRows = Object.entries(HEADS).map(([k,h])=>
    `<tr><td>${h.label}</td><td class="r">${spend?Math.round(t[k]/spend*100):0}%</td><td class="r">${money(t[k])}</td></tr>`).join('')
    + (t.contractor?`<tr><td>Contractor bills</td><td class="r">${spend?Math.round(t.contractor/spend*100):0}%</td><td class="r">${money(t.contractor)}</td></tr>`:'');

  const detail = pick ? `
    <h4>Entry detail — ${siteName(pick)}</h4>
    <table>
      <tr><th>Date</th><th>Head</th><th>Item</th><th class="r">Poles</th><th>Paid to</th><th>Mode</th><th>By</th><th class="r">Amount</th></tr>
      ${rows.map(e=>`<tr>
        <td>${dmy(e.date)}</td>
        <td>${e.head==='advance'?'Advance':e.head==='contractor'?'Contractor':(HEADS[e.head]||{}).label||''}</td>
        <td>${e.item}${e.note?'<br><span style="color:#666">'+e.note+'</span>':''}</td>
        <td class="r">${e.poles||''}</td>
        <td>${e.payee||'—'}</td><td>${e.mode||''}</td><td>${e.by||''}</td>
        <td class="r">${e.head==='advance'?'+':''}${money(e.amount)}</td></tr>`).join('')}
    </table>` : '';

  $('report').innerHTML = `
    <div class="rh">
      <div class="co">ENTRIX INNOVATION</div>
      <div class="ti">Onsite Installation Expenses — Summary Report</div>
      <div class="pd">Period: ${period} · ${pick?siteName(pick):scope.length+' sites'} · Generated ${dmy(today())}</div>
    </div>
    ${owner?`<div class="kpi">
      <div>Order value<b>${money(cost)}</b></div>
      <div>Value earned<b>${money(earned)}</b></div>
      ${poles?`<div>Poles installed<b>${poles}</b></div>`:''}
      <div>Total spend<b>${money(spend)}</b></div>
      <div>Net ${profit>=0?'profit':'loss'}<b class="${profit<0?'neg':''}">${money(Math.abs(profit))}</b></div>
      <div>Margin<b>${earned?Math.round(profit/earned*1000)/10:0}%</b></div>
    </div>`:`<div class="kpi"><div>Total spend<b>${money(spend)}</b></div><div>Advances<b>${money(t.advance)}</b></div></div>`}

    <h4>Site-wise position</h4>
    <table>
      <tr><th>Site</th><th>Supervisor</th><th>Executed by</th><th class="r">Poles</th>
        ${owner?'<th class="r">Earned</th><th class="r">Contr. cost</th>':''}
        <th class="r">Spend</th>
        ${owner?'<th class="r">Due to contr.</th><th class="r">Profit</th>':''}</tr>
      ${siteRows}
      <tr class="sum"><td colspan="3">Total</td><td class="r">${poles||'—'}</td>${owner?`<td class="r">${money(earned)}</td><td class="r">${money(awardedTot)}</td>`:''}<td class="r">${money(spend)}</td>${owner?`<td class="r"></td><td class="r">${money(profit)}</td>`:''}</tr>
    </table>

    <h4>Expense head analysis</h4>
    <table>
      <tr><th>Head</th><th class="r">Share</th><th class="r">Amount</th></tr>
      ${headRows}
      <tr class="sum"><td>Total</td><td class="r">100%</td><td class="r">${money(spend)}</td></tr>
    </table>
    ${detail}
    <div class="foot"><span>ENTRIX Innovation, Nagpur · entrix.co.in</span><span>Prepared by ${ME.name}</span></div>`;

  setTimeout(()=>window.print(), 120);
};

$('csvBtn').onclick = ()=>{
  const rows=filtered();
  if(!rows.length) return toast('Nothing to export', true);
  const esc = v => `"${String(v??'').replace(/"/g,'""')}"`;
  const cols = ['Date','Site','Client','Supervisor','Contractor','Type','Head','Item','Poles','Amount','Paid by','Paid to / From','Remark','Entered by'];
  const body = rows.map(e=>[
    dmy(e.date), siteName(e.siteId), site(e.siteId).client||'', site(e.siteId).supervisor||'', site(e.siteId).contractor||'', e.kind,
    e.head==='advance'?'Advance':e.head==='contractor'?'Contractor bill':(HEADS[e.head]||{}).label||e.head, e.item, e.poles||'', e.amount,
    e.mode, e.payee, e.note, e.by
  ].map(esc).join(','));
  const blob = new Blob(['\uFEFF'+[cols.map(esc).join(','),...body].join('\r\n')],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`entrix-installation-expenses-${today()}.csv`;
  a.click(); URL.revokeObjectURL(a.href);
  toast('CSV downloaded');
};
